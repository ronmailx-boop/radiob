<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBudget Pro</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --purple: #6c5ce7; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 160px; }
        
        /* כותרת עליונה עם חיבור גוגל */
        .header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        /* מלבני תוכן דינמיים - לא נחתכים */
        .card { 
            background: white; margin: 10px; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; 
            align-items: center; flex-wrap: wrap; min-height: 60px;
        }
        .item-text { flex: 1; font-weight: bold; color: var(--primary); word-wrap: break-word; font-size: 1.1em; padding-left: 10px; }
        .item-price { font-size: 1.2em; color: #e74c3c; font-weight: bold; }

        /* המלבן הסגול התחתון והכפתורים */
        .footer-panel { 
            position: fixed; bottom: 0; width: 100%; background: var(--purple); 
            padding: 20px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 999;
        }
        .btn-group { display: flex; gap: 20px; justify-content: center; width: 100%; }
        .action-btn { 
            background: white; border: none; width: 55px; height: 55px; border-radius: 50%; 
            font-size: 24px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); cursor: pointer;
        }
        
        /* ניווט בין עמודים */
        .nav-tabs { display: flex; gap: 40px; color: white; font-weight: bold; font-size: 1.1em; }
        .nav-link { opacity: 0.6; cursor: pointer; }
        .nav-link.active { opacity: 1; border-bottom: 2px solid white; }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">SmartBudget</h3>
    <div id="g_id_onload" data-client_id="151476121869-b5lbrt5t89s8d342ftd1cg1q926518pt.apps.googleusercontent.com" data-callback="onSignIn"></div>
    <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
</div>

<div id="budgetPage" class="page active">
    <h2 style="text-align:center; padding: 10px;">📊 ריכוז תקציבים</h2>
    <div class="card">
        <div class="item-text">הפניקס ביטוח מקיף - תשלום שנתי לרכב</div>
        <div class="item-price">₪4,500</div>
    </div>
</div>

<div id="shopPage" class="page">
    <h2 style="text-align:center; padding: 10px;">🛒 רשימת קניות</h2>
    </div>

<div class="footer-panel">
    <div class="btn-group">
        <button class="action-btn" onclick="toggleLock()">🔓</button>
        <button class="action-btn" onclick="addItem()" style="background: #27ae60; color: white; width: 65px; height: 65px; font-size: 30px;">+</button>
        <button class="action-btn" onclick="toggleEdit()">✏️</button>
    </div>
    
    <div class="nav-tabs">
        <span class="nav-link" onclick="switchTab('shop', this)">קניות</span>
        <span class="nav-link active" onclick="switchTab('budget', this)">ריכוז תקציב</span>
    </div>
</div>

<script>
    function switchTab(type, el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(type + 'Page').classList.add('active');
    }

    function onSignIn(resp) { console.log("Cloud Connected"); }
    function addItem() { alert("פתיחת חלון הוספה..."); }
    function toggleLock() { alert("רשימה ננעלה"); }
    function toggleEdit() { alert("מצב עריכה הופעל"); }
</script>

</body>
</html>
