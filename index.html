<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0f00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="רשת ב׳" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>רשת ב׳ | כאן</title>

  <!-- HLS.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Noto+Serif+Hebrew:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #100900;
      --surface:   #1e1000;
      --amber:     #e8a020;
      --amber-dim: #b07010;
      --amber-glow:#f5c050;
      --cream:     #f2e8d0;
      --muted:     #7a6040;
      --red:       #c0392b;
      --green:     #2ecc71;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Noto Serif Hebrew', serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Warm vignette ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 60%, transparent 30%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100svh;
      padding: 2rem 1.5rem;
      gap: 0;
    }

    /* ── Station badge ── */
    .station-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 2.2rem;
    }

    .badge-logo {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 900;
      font-size: clamp(5rem, 22vw, 9rem);
      line-height: 0.85;
      color: var(--amber);
      text-shadow:
        0 0 40px rgba(232,160,32,0.4),
        0 0 80px rgba(232,160,32,0.15);
      letter-spacing: -2px;
      animation: glow-pulse 4s ease-in-out infinite;
    }

    .badge-sub {
      font-family: 'Noto Serif Hebrew', serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 40px rgba(232,160,32,0.4), 0 0 80px rgba(232,160,32,0.15); }
      50%       { text-shadow: 0 0 60px rgba(232,160,32,0.65), 0 0 120px rgba(232,160,32,0.25); }
    }

    /* ── Frequency display ── */
    .freq-display {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 300;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 2.8rem;
    }

    /* ── Speaker / play button ── */
    .play-btn {
      position: relative;
      width: clamp(100px, 28vw, 140px);
      height: clamp(100px, 28vw, 140px);
      border-radius: 50%;
      border: 2px solid var(--amber-dim);
      background: radial-gradient(circle at 40% 35%, #2a1800, #0d0600);
      cursor: pointer;
      transition: border-color 0.3s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 8px rgba(232,160,32,0.04),
        0 0 0 16px rgba(232,160,32,0.02),
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 8px 32px rgba(0,0,0,0.8);
      margin-bottom: 2.5rem;
    }

    .play-btn:active { transform: scale(0.95); }

    .play-btn.playing {
      border-color: var(--amber);
      box-shadow:
        0 0 0 8px rgba(232,160,32,0.08),
        0 0 0 24px rgba(232,160,32,0.04),
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 8px 48px rgba(232,160,32,0.25),
        0 0 80px rgba(232,160,32,0.08);
    }

    .play-icon {
      width: 44%;
      height: 44%;
      fill: var(--amber);
      transition: fill 0.2s;
      margin-right: -6%; /* visual center for triangle */
    }

    .pause-icon {
      display: none;
      width: 38%;
      height: 38%;
      fill: var(--amber);
    }

    .play-btn.playing .play-icon  { display: none; }
    .play-btn.playing .pause-icon { display: block; }

    /* Ripple ring when playing */
    .play-btn.playing::before,
    .play-btn.playing::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(232,160,32,0.25);
      animation: ripple 2.5s ease-out infinite;
    }
    .play-btn.playing::after { animation-delay: 1.25s; }

    @keyframes ripple {
      0%   { inset: 0;        opacity: 0.6; }
      100% { inset: -28px;    opacity: 0; }
    }

    /* ── VU / wave bars ── */
    .vu-wrap {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 32px;
      margin-bottom: 2rem;
      opacity: 0;
      transition: opacity 0.6s;
    }
    .vu-wrap.active { opacity: 1; }

    .vu-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--amber-dim);
      height: 6px;
      animation: none;
    }

    .vu-wrap.active .vu-bar {
      animation: bounce var(--dur, 0.7s) ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { height: 4px;  background: var(--amber-dim); }
      to   { height: var(--h, 28px); background: var(--amber-glow); }
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 1.4rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.on  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 1.8s infinite; }
    .status-dot.err { background: var(--red); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Volume slider ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 2.2rem;
      width: min(300px, 85vw);
    }

    .vol-icon { color: var(--muted); font-size: 1rem; flex-shrink: 0; }

    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      background: linear-gradient(to left, var(--amber) var(--pct, 80%), #2a1800 var(--pct, 80%));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 8px rgba(232,160,32,0.5);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--amber);
      border: none;
      cursor: pointer;
    }

    /* ── Bluetooth settings ── */
    .bt-section {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 1.2rem);
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .bt-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.04em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .bt-toggle:hover { opacity: 1; }
    .bt-toggle svg { width: 14px; height: 14px; }

    .bt-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid rgba(232,160,32,0.15);
      border-radius: 12px;
      padding: 1rem 1.4rem;
      width: min(320px, 90vw);
    }
    .bt-panel.open { display: flex; }

    .bt-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    .bt-input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    .bt-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(232,160,32,0.2);
      border-radius: 8px;
      color: var(--cream);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.5rem 0.8rem;
      outline: none;
      text-align: right;
      direction: rtl;
    }
    .bt-input:focus { border-color: var(--amber-dim); }
    .bt-input::placeholder { color: var(--muted); }

    .bt-save {
      background: var(--amber-dim);
      border: none;
      border-radius: 8px;
      color: #1a0900;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .bt-save:hover { background: var(--amber); }

    .bt-status {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Loading spinner ── */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(232,160,32,0.2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<audio id="radio" preload="none"></audio>

<div class="app">

  <div class="station-badge">
    <div class="badge-logo">ב׳</div>
    <div class="badge-sub">כאן • רשת ב׳ • רדיו</div>
  </div>

  <div class="freq-display">FM 88.2 · 106.0 · 106.5 · 107.8</div>

  <!-- Play/Pause button -->
  <button class="play-btn" id="playBtn" aria-label="הפעל / השהה">
    <!-- Play triangle -->
    <svg class="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    <!-- Pause bars -->
    <svg class="pause-icon" viewBox="0 0 24 24">
      <rect x="5" y="3" width="4" height="18" rx="1"/>
      <rect x="15" y="3" width="4" height="18" rx="1"/>
    </svg>
  </button>

  <!-- VU meter bars -->
  <div class="vu-wrap" id="vuWrap">
    <div class="vu-bar" style="--dur:0.55s;--h:18px"></div>
    <div class="vu-bar" style="--dur:0.70s;--h:28px"></div>
    <div class="vu-bar" style="--dur:0.45s;--h:22px"></div>
    <div class="vu-bar" style="--dur:0.80s;--h:30px"></div>
    <div class="vu-bar" style="--dur:0.60s;--h:14px"></div>
    <div class="vu-bar" style="--dur:0.50s;--h:26px"></div>
    <div class="vu-bar" style="--dur:0.75s;--h:20px"></div>
    <div class="vu-bar" style="--dur:0.65s;--h:24px"></div>
    <div class="vu-bar" style="--dur:0.40s;--h:16px"></div>
  </div>

  <!-- Status -->
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">לחץ להפעלה</span>
    <div class="spinner" id="spinner"></div>
  </div>

  <!-- Volume -->
  <div class="volume-row">
    <span class="vol-icon">🔈</span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
    <span class="vol-icon">🔊</span>
  </div>

</div>

<!-- Bluetooth section -->
<div class="bt-section">
  <button class="bt-toggle" id="btToggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6.5,6.5 17.5,17.5"/>
      <polyline points="17.5,6.5 12,12 17.5,17.5"/>
      <line x1="5" y1="12" x2="12" y2="12"/>
    </svg>
    הפעלה אוטומטית ב־Bluetooth
  </button>
  <div class="bt-panel" id="btPanel">
    <div class="bt-label">הכנס את שם התקן הבלוטות' של הרכב שלך (כפי שמופיע בהגדרות):</div>
    <div class="bt-input-row">
      <input class="bt-input" id="btNameInput" type="text" placeholder='לדוג׳: "My Car" או "JBL"' />
      <button class="bt-save" id="btSave">שמור</button>
    </div>
    <div class="bt-status" id="btStatus">לא מוגדר</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Stream URL ──────────────────────────────────────────────────
  const STREAM_HLS = 'https://kanbet.media.kan.org.il/hls/live/2024811/2024811/kanbet_mp3/chunklist.m3u8';
  const STREAM_MP3 = 'https://kanliveicy.media.kan.org.il/icy/kanbet_mp3';

  // ── DOM ──────────────────────────────────────────────────────────
  const audio       = document.getElementById('radio');
  const playBtn     = document.getElementById('playBtn');
  const vuWrap      = document.getElementById('vuWrap');
  const statusDot   = document.getElementById('statusDot');
  const statusText  = document.getElementById('statusText');
  const spinner     = document.getElementById('spinner');
  const volumeSlider= document.getElementById('volumeSlider');
  const btToggle    = document.getElementById('btToggle');
  const btPanel     = document.getElementById('btPanel');
  const btNameInput = document.getElementById('btNameInput');
  const btSave      = document.getElementById('btSave');
  const btStatus    = document.getElementById('btStatus');

  // ── State ────────────────────────────────────────────────────────
  let hls         = null;
  let isPlaying   = false;
  let isLoading   = false;
  let btDeviceName= localStorage.getItem('btDeviceName') || '';
  let prevDevices = [];

  // ── Init HLS ──────────────────────────────────────────────────────
  function initHls () {
    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
      hls = new Hls({ lowLatencyMode: true, maxBufferLength: 30 });
      hls.loadSource(STREAM_HLS);
      hls.attachMedia(audio);
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) handleError('שגיאת זרם');
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS (Safari / iOS)
      audio.src = STREAM_HLS;
    } else {
      // Fallback to MP3
      audio.src = STREAM_MP3;
    }
  }

  // ── Play / Stop ───────────────────────────────────────────────────
  function play () {
    if (isPlaying || isLoading) return;
    isLoading = true;
    setStatus('loading', 'מתחבר לשידור…');
    initHls();
    audio.volume = parseFloat(volumeSlider.value);
    audio.play().catch(() => handleError('לא ניתן להפעיל'));
  }

  function stop () {
    audio.pause();
    audio.src = '';
    if (hls) { hls.destroy(); hls = null; }
    isPlaying = false;
    isLoading = false;
    playBtn.classList.remove('playing');
    vuWrap.classList.remove('active');
    setStatus('idle', 'לחץ להפעלה');
  }

  function togglePlay () {
    if (isPlaying) stop();
    else play();
  }

  // ── Audio events ──────────────────────────────────────────────────
  audio.addEventListener('playing', () => {
    isPlaying = true;
    isLoading = false;
    playBtn.classList.add('playing');
    vuWrap.classList.add('active');
    setStatus('on', 'בשידור חי');
  });

  audio.addEventListener('waiting', () => {
    if (isPlaying) setStatus('loading', 'מאחזר…');
  });

  audio.addEventListener('stalled', () => handleError('קישור איטי, מנסה שוב…'));
  audio.addEventListener('error',   () => handleError('שגיאת חיבור'));

  // ── Status helper ─────────────────────────────────────────────────
  function setStatus (state, msg) {
    statusText.textContent = msg;
    statusDot.className = 'status-dot';
    spinner.classList.remove('active');
    if (state === 'on')      { statusDot.classList.add('on'); }
    else if (state === 'err'){ statusDot.classList.add('err'); }
    else if (state === 'loading') { spinner.classList.add('active'); }
  }

  function handleError (msg) {
    isPlaying = false;
    isLoading = false;
    playBtn.classList.remove('playing');
    vuWrap.classList.remove('active');
    setStatus('err', msg);
    // Retry after 3s
    setTimeout(() => { if (!isPlaying) { stop(); setStatus('idle', 'לחץ להפעלה'); } }, 3000);
  }

  // ── Volume ───────────────────────────────────────────────────────
  volumeSlider.addEventListener('input', () => {
    const v = parseFloat(volumeSlider.value);
    audio.volume = v;
    volumeSlider.style.setProperty('--pct', (v * 100) + '%');
  });
  // Set initial gradient
  volumeSlider.style.setProperty('--pct', (parseFloat(volumeSlider.value) * 100) + '%');

  // ── Play button ───────────────────────────────────────────────────
  playBtn.addEventListener('click', togglePlay);

  // ── Bluetooth auto-play ───────────────────────────────────────────
  function getBtName () { return localStorage.getItem('btDeviceName') || ''; }

  async function snapshotDevices () {
    try {
      // Enumerate audio OUTPUT devices (requires permissions)
      const devices = await navigator.mediaDevices.enumerateDevices();
      return devices.filter(d => d.kind === 'audiooutput').map(d => d.label || d.deviceId);
    } catch { return []; }
  }

  async function onDeviceChange () {
    const name = getBtName().trim().toLowerCase();
    if (!name) return;

    const current = await snapshotDevices();
    const added = current.filter(d => !prevDevices.includes(d));
    prevDevices = current;

    const matched = added.some(label => label.toLowerCase().includes(name));
    if (matched && !isPlaying) {
      console.log('Bluetooth matched – auto-playing');
      play();
    }
  }

  async function initBluetooth () {
    prevDevices = await snapshotDevices();
    if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
      navigator.mediaDevices.addEventListener('devicechange', onDeviceChange);
    }
  }

  initBluetooth();

  // ── BT Settings panel ─────────────────────────────────────────────
  btToggle.addEventListener('click', () => {
    btPanel.classList.toggle('open');
    if (btPanel.classList.contains('open')) {
      btNameInput.value = getBtName();
      updateBtStatus();
    }
  });

  function updateBtStatus () {
    const n = getBtName();
    btStatus.textContent = n ? `✓ מוגדר: "${n}"` : 'לא מוגדר';
  }

  btSave.addEventListener('click', () => {
    const val = btNameInput.value.trim();
    localStorage.setItem('btDeviceName', val);
    updateBtStatus();
    btPanel.classList.remove('open');
  });

  updateBtStatus();

  // ── Service Worker ────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── Wake Lock (keep screen on in car) ─────────────────────────────
  async function requestWakeLock () {
    if ('wakeLock' in navigator) {
      try { await navigator.wakeLock.request('screen'); } catch {}
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) requestWakeLock();
  });

})();
</script>
</body>
</html>
