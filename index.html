<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget - SL6</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --text: #333;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text);
        }
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* פתרון המלבנים הדינמיים - הטקסט לא נחתך */
        .card { 
            background: white; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; /* מאפשר לטקסט ארוך לרדת שורה */
            min-height: 60px;
            border-right: 5px solid var(--accent);
        }
        .item-info { 
            flex: 1; 
            font-weight: 600; 
            word-wrap: break-word; 
            font-size: 1.1em;
            padding-left: 10px;
        }
        .item-price { 
            font-size: 1.2em; 
            color: #e74c3c; 
            font-weight: bold; 
            white-space: nowrap;
        }
        
        .add-section { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        input { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; /* מונע זום אוטומטי באייפון/אנדרואיד */
        }
        .btn-add { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }
        #status { font-size: 0.8em; opacity: 0.8; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0;">SmartBudget</h2>
        <div id="status">ממתין לחיבור ענן...</div>
    </div>
    <div id="g_id_onload"
         data-client_id="151476121869-b5lbrt5t89s8d342ftd1cg1q926518pt.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="small"></div>
</div>

<div class="add-section">
    <input type="text" id="nameInp" placeholder="שם ההוצאה (למשל: הפניקס)">
    <input type="number" id="priceInp" placeholder="סכום">
    <button class="btn-add" onclick="addNewItem()">הוסף לרשימה</button>
</div>

<div id="itemsContainer"></div>

<script>
    let budgetItems = [];
    const CLIENT_ID = '151476121869-b5lbrt5t89s8d342ftd1cg1q926518pt.apps.googleusercontent.com';

    // טיפול בהתחברות מגוגל
    function handleCredentialResponse(response) {
        console.log("התחברת בהצלחה");
        document.getElementById('status').innerText = "מחובר לענן ✅";
        // כאן תתווסף בעתיד הלוגיקה של Google Drive API
    }

    function addNewItem() {
        const name = document.getElementById('nameInp').value;
        const price = document.getElementById('priceInp').value;
        
        if (name && price) {
            budgetItems.push({ name, price });
            document.getElementById('nameInp').value = '';
            document.getElementById('priceInp').value = '';
            updateUI();
            saveLocally();
        }
    }

    function updateUI() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = budgetItems.map(item => `
            <div class="card">
                <div class="item-info">${item.name}</div>
                <div class="item-price">₪${item.price}</div>
            </div>
        `).join('');
    }

    function saveLocally() {
        localStorage.setItem('smart_budget_data', JSON.stringify(budgetItems));
    }

    // טעינת נתונים קיימים בפתיחת האפליקציה
    window.onload = () => {
        const data = localStorage.getItem('smart_budget_data');
        if (data) {
            budgetItems = JSON.parse(data);
            updateUI();
        }
    };
</script>

</body>
</html>
