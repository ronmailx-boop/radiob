<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vplus - ניהול תקציב חכם</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

    <div class="app-header no-print">
        <h1 class="font-bold text-2xl" style="direction: ltr;"><span style="color: #22c55e !important;">V</span><span class="text-indigo-600">plus</span></h1>
        
        <div class="header-controls">
            <button id="cloudBtn" onclick="handleAuthClick()" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-bold border border-indigo-100 flex items-center gap-1">
                <span>סנכרון ענן</span>
                <div id="cloudIndicator" class="w-2 h-2 bg-gray-300 rounded-full"></div>
            </button>
            <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleAuth" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="icon" data-shape="circle" data-size="medium"></div>
            <button onclick="openModal('settingsModal')" class="p-2 rounded-full hover:bg-gray-100 gear-btn">
                <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 no-print">
        <div class="flex gap-3 mb-6">
            <div id="tabLists" onclick="showPage('lists')" class="tab-btn tab-active shadow-sm text-lg">הרשימה שלי</div>
            <div id="tabSummary" onclick="showPage('summary')" class="tab-btn tab-inactive shadow-sm text-lg">הרשימות שלי</div>
        </div>

        <div id="pageLists">
            <div class="flex gap-2 mb-4 justify-between items-center bg-white p-2 rounded-2xl border border-gray-100 shadow-sm lists-header-card">
                <button onclick="openModal('newListModal')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-sm flex-1">+ רשימה חדשה</button>
            </div>
            <div class="category-separator">
                <div id="listNameDisplay" class="text-3xl font-black text-center" onclick="openModal('editListNameModal')"></div>
                <div id="statusTag" class="text-[10px] font-bold mt-1 opacity-80 text-center">נעול</div>
            </div>
            <div id="itemsContainer"></div>
        </div>

        <div id="pageSummary" class="hidden">
            <div class="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-100 flex items-center gap-3">
                <input type="checkbox" id="selectAllLists" onchange="toggleSelectAll(this.checked)" class="w-7 h-7 accent-indigo-600">
                <span id="selectAllLabel" class="font-bold text-slate-700 text-lg">בחר את כל הרשימות</span>
            </div>
            <div id="summaryContainer"></div>
        </div>
    </div>

    <div id="printArea"></div>

    <div class="bottom-bar text-white no-print">
        <div class="flex items-center justify-between mb-4">
            <div class="flex-1 text-center">
                <div class="text-[10px] opacity-70">סה"כ רשימה</div>
                <div class="text-xl font-bold">₪<span id="displayTotal">0.00</span></div>
            </div>
            <div class="flex-shrink-0">
                <button onclick="openModal('inputForm')" class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/20 text-white text-4xl font-bold">+</button>
            </div>
            <div class="flex-1 text-center">
                <div class="text-[10px] opacity-70">שולם ברשימה</div>
                <div class="text-xl font-bold">₪<span id="displayPaid">0.00</span></div>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <button onclick="openModal('confirmModal')" class="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center shadow-lg border-2 border-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
            <div class="text-center flex-1">
                <div class="text-[10px] opacity-70">נשאר לשלם</div>
                <div class="text-2xl font-black text-orange-300">₪<span id="displayLeft">0.00</span></div>
            </div>
            <button id="lockBtn" onclick="toggleLock()" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg border-2 border-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path id="lockIconPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></button>
        </div>
    </div>

    <div id="inputForm" class="modal-overlay no-print">
        <div class="edit-modal">
            <h2 class="text-xl font-bold mb-6">הוספת מוצר</h2>
            <input type="text" id="itemName" placeholder="שם המוצר" class="modal-input">
            <input type="number" id="itemPrice" inputmode="decimal" placeholder="מחיר" class="modal-input">
            <div class="flex gap-3">
                <button class="bg-green-500 text-white flex-1 py-4 rounded-xl font-bold shadow-md" onclick="addItem()">הוסף</button>
                <button class="bg-gray-100 text-gray-400 flex-1 py-4 rounded-xl font-bold" onclick="closeModal('inputForm')">ביטול</button>
            </div>
        </div>
    </div>

    <div id="newListModal" class="modal-overlay no-print">
        <div class="edit-modal">
            <h2 class="text-xl font-bold mb-6">רשימה חדשה</h2>
            <input type="text" id="newListNameInput" placeholder="שם הרשימה" class="modal-input">
            <div class="flex gap-3">
                <button class="bg-indigo-600 text-white flex-1 py-4 rounded-xl font-bold shadow-md" onclick="saveNewList()">צור</button>
                <button class="bg-gray-100 text-gray-400 flex-1 py-4 rounded-xl font-bold" onclick="closeModal('newListModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay no-print"><div class="edit-modal"><h2 class="text-xl font-bold mb-2 text-red-600">ניקוי רשימה</h2><p class="text-sm text-gray-400 mb-6">למחוק את כל המוצרים?</p><div class="flex gap-3"><button class="bg-red-500 text-white flex-1 py-4 rounded-xl font-bold shadow-lg" onclick="executeClear()">נקה</button><button class="bg-gray-100 text-gray-400 flex-1 py-4 rounded-xl font-bold" onclick="closeModal('confirmModal')">ביטול</button></div></div></div>
    <div id="deleteListModal" class="modal-overlay no-print"><div class="edit-modal"><h2 class="text-xl font-bold mb-4 text-red-600">מחיקת רשימה</h2><p class="text-sm text-gray-400 mb-6">למחוק את הרשימה כולה לצמיתות?</p><div class="flex gap-3"><button id="confirmDeleteListBtn" class="bg-red-500 text-white flex-1 py-4 rounded-xl font-bold">מחק</button><button class="bg-gray-100 text-gray-500 flex-1 py-4 rounded-xl font-bold" onclick="closeModal('deleteListModal')">ביטול</button></div></div></div>
    <div id="editListNameModal" class="modal-overlay no-print"><div class="edit-modal"><h2>שינוי שם</h2><input type="text" id="editListNameInput" placeholder="הכנס שם חדש" class="modal-input"><div class="flex gap-3"><button class="bg-indigo-600 text-white flex-1 py-4 rounded-xl font-bold" onclick="saveListName()">שמור</button><button class="bg-gray-100 flex-1 py-4 rounded-xl font-bold" onclick="closeModal('editListNameModal')">ביטול</button></div></div></div>
    <div id="editTotalModal" class="modal-overlay no-print"><div class="edit-modal"><h2>עדכון מחיר</h2><input type="number" id="editTotalInput" inputmode="decimal" placeholder="מחיר חדש" class="modal-input"><div class="flex gap-3"><button class="bg-indigo-600 text-white flex-1 py-4 rounded-xl font-bold" onclick="saveTotal()">עדכן</button><button class="bg-gray-100 flex-1 py-4 rounded-xl font-bold" onclick="closeModal('editTotalModal')">ביטול</button></div></div></div>
    
    <div id="settingsModal" class="modal-overlay no-print">
        <div class="edit-modal">
            <h2 class="font-bold mb-4">הגדרות</h2>
            <button onclick="toggleDarkMode()" class="w-full bg-indigo-50 text-indigo-600 py-4 rounded-xl font-bold mb-4">מצב לילה 🌙</button>
            <button onclick="preparePrint()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg">הדפס PDF 🖨️</button>
            <button onclick="closeModal('settingsModal')" class="mt-4 text-gray-400 font-bold block w-full">סגור</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
